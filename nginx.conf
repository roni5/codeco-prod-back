events {}

http {

  upstream ai_router    { server ai-router:4000; }
  upstream cal_service  { server calcom:3000; }

  # -------------------------------------------------------
  # api.codeco.tech — HTTP → HTTPS redirect
  # -------------------------------------------------------
  server {
    listen 80;
    server_name api.codeco.tech;
    return 301 https://$host$request_uri;
  }

  # -------------------------------------------------------
  # api.codeco.tech — HTTPS
  # -------------------------------------------------------
  server {
    listen 443 ssl;
    server_name api.codeco.tech;

    ssl_certificate     /opt/codeco/certs/fullchain.pem;
    ssl_certificate_key /opt/codeco/certs/privkey.pem;

    # Health check
    location = /health {
      default_type application/json;
      return 200 '{"status":"ok"}';
    }

    # Ollama on Mac M4 via Tailscale
    location /ai/ {
      proxy_pass         http://100.117.129.87:11434/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
    }

    # Stripe payment success
    location /paymentsuccess {
      proxy_pass         http://ai_router/paymentsuccess;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
    }

    # Everything else → ai_router
    location / {
      proxy_pass         http://ai_router;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
    }
  }

  # -------------------------------------------------------
  # cal.codeco.tech — HTTP → HTTPS redirect
  # -------------------------------------------------------
  server {
    listen 80;
    server_name cal.codeco.tech;
    return 301 https://$host$request_uri;
  }

  # -------------------------------------------------------
  # cal.codeco.tech — HTTPS
  # -------------------------------------------------------
  server {
    listen 443 ssl;
    server_name cal.codeco.tech;

    ssl_certificate     /opt/codeco/certs/fullchain.pem;
    ssl_certificate_key /opt/codeco/certs/privkey.pem;

    location / {
      proxy_pass         http://cal_service;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
    }
  }

}
